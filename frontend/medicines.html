<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HerbaGuard - Tủ Thuốc Của Tôi</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="medicines.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-container">
            <div class="logo-group" id="nav-logo">
                <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
                <span class="logo-text">HerbaGuard</span>
            </div>

            <div class="desktop-menu">
                <a href="index.html">Trang Chủ</a>
                <a href="check.html">Kiểm Tra Tương Tác</a>
                <a href="medicines.html" class="active">Tủ Thuốc</a>
                <a href="chat.html">Trợ Lý AI</a>
            </div>

            <div class="user-group">
                <button class="btn-icon" id="btn-notification">
                    <i class="fa-regular fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <a href="settings.html">
                    <img src="https://ui-avatars.com/api/?name=User&background=10B981&color=fff" alt="Avatar" class="avatar" id="nav-avatar" style="cursor: pointer;">
                </a>
                <div class="user-info">
                    <p id="greeting-text">Xin chào,</p>
                    <p>Người dùng</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content" style="max-width: 980px;">

        <div class="page-header page-header-row">
            <div>
                <h1>Tủ Thuốc Của Tôi</h1>
                <p>Quản lý thuốc tây, thảo dược và lịch nhắc uống hằng ngày.</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary" id="btnFocusMedicineForm" type="button"><i class="fa-solid fa-plus"></i> Thêm mục mới</button>
                <button class="btn-primary btn-light" id="btnExportMedicinePdf" type="button"><i class="fa-solid fa-file-pdf"></i> Xuất PDF</button>
            </div>
        </div>

        <section class="panel-card" id="medicine-panel">
            <div class="section-header">
                <h3>Thuốc / Thảo dược</h3>
                <span class="muted-text" id="medicineCountBadge">0 mục</span>
            </div>

            <form id="medicineForm" class="entity-form" novalidate>
                <input id="medicineId" type="hidden" value="">
                <div class="form-grid two-col">
                    <label class="field-label" for="medicineName">Tên thuốc hoặc thảo dược *</label>
                    <input class="input-control" id="medicineName" name="medicineName" maxlength="120" required placeholder="Ví dụ: aspirin, nhân sâm">

                    <label class="field-label" for="medicineKind">Loại</label>
                    <select class="input-control" id="medicineKind" name="medicineKind">
                        <option value="unknown">Chưa rõ</option>
                        <option value="drug">Thuốc Tây</option>
                        <option value="herb">Thảo Dược</option>
                    </select>

                    <label class="field-label" for="medicineDosage">Liều dùng</label>
                    <input class="input-control" id="medicineDosage" name="medicineDosage" maxlength="120" placeholder="Ví dụ: 500mg, 1 viên/lần">

                    <label class="field-label" for="medicineStock">Tồn kho</label>
                    <input class="input-control" id="medicineStock" name="medicineStock" type="number" min="0" max="10000" value="0">
                </div>

                <label class="field-label" for="medicineInstructions">Hướng dẫn dùng</label>
                <textarea class="input-control textarea-control" id="medicineInstructions" name="medicineInstructions" maxlength="300" placeholder="Ví dụ: Uống sau ăn sáng"></textarea>

                <div class="form-actions">
                    <button class="btn-primary" id="btnSaveMedicine" type="submit"><i class="fa-solid fa-floppy-disk"></i> Lưu mục</button>
                    <button class="btn-primary btn-light" id="btnCancelMedicineEdit" type="button">Hủy chỉnh sửa</button>
                </div>
                <div id="medicineFormMsg" class="status-message hidden"></div>
            </form>

            <div id="medicineList" class="medicine-list"></div>
        </section>

        <section class="panel-card" style="margin-top: 20px;">
            <div class="section-header">
                <h3>Lịch nhắc uống</h3>
                <span class="muted-text" id="reminderCountBadge">0 lịch</span>
            </div>

            <form id="reminderForm" class="entity-form" novalidate>
                <input id="reminderId" type="hidden" value="">
                <div class="form-grid two-col">
                    <label class="field-label" for="reminderMedicine">Thuốc / Thảo dược *</label>
                    <select class="input-control" id="reminderMedicine" required></select>

                    <label class="field-label" for="reminderTime">Giờ nhắc *</label>
                    <input class="input-control" id="reminderTime" type="time" required>

                    <label class="field-label" for="reminderFrequency">Tần suất</label>
                    <input class="input-control" id="reminderFrequency" maxlength="120" value="Hằng ngày" placeholder="Ví dụ: Ngày 2 lần">

                    <label class="field-label" for="reminderMealNote">Ghi chú bữa ăn</label>
                    <input class="input-control" id="reminderMealNote" maxlength="120" placeholder="Ví dụ: Sau bữa sáng">
                </div>

                <label class="checkbox-row" for="reminderEnabled">
                    <input id="reminderEnabled" type="checkbox" checked>
                    <span>Kích hoạt lịch nhắc này</span>
                </label>

                <div class="form-actions">
                    <button class="btn-primary" id="btnSaveReminder" type="submit"><i class="fa-solid fa-clock"></i> Lưu lịch nhắc</button>
                    <button class="btn-primary btn-light" id="btnCancelReminderEdit" type="button">Hủy chỉnh sửa</button>
                </div>
                <div id="reminderFormMsg" class="status-message hidden"></div>
            </form>

            <div id="reminderList" class="medicine-list"></div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Trang Chủ</span>
        </a>
        <a href="check.html" class="nav-item">
            <i class="fa-solid fa-camera"></i>
            <span>Kiểm Tra</span>
        </a>
        <a href="medicines.html" class="nav-item active">
            <i class="fa-solid fa-pills"></i>
            <span>Tủ Thuốc</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Cá Nhân</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="medicines.js"></script>
</body>
</html>
